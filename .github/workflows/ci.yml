name: CI

on:
  pull_request:
  push:
    branches: [main, "pivot/**"]

jobs:
  security:
    name: security-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_NOGIT: "true"

  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: risk_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d risk_monitor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/libs/common/pyproject.toml
            backend/services/risk/requirements.base.txt
            backend/services/risk/**/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e backend/libs/common
          while IFS= read -r req; do
            echo "Installing $req"
            python -m pip install -r "$req"
          done < <(find backend/services -name requirements.txt | sort)
          python -m pip install -r backend/requirements-dev.txt

      - name: Validate migrations
        run: |
          cd backend
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/risk_monitor \
            alembic -c alembic.ini upgrade head

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend/dashboard

      - name: Test and build
        run: |
          npm test --prefix frontend/dashboard
          npm run build --prefix frontend/dashboard

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [security, backend-quality, frontend-quality]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build service images
        run: |
          set -euo pipefail
          docker build -t moal-api -f backend/services/risk/api/Dockerfile .
          docker build -t moal-ml -f backend/services/risk/ml/Dockerfile .
          docker build -t moal-migrations -f backend/Dockerfile.migrations .
          docker build -t moal-dashboard -f frontend/dashboard/Dockerfile .

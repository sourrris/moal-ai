name: CI

on:
  pull_request:
  push:
    branches: [main, work, "upgrade/**"]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend/libs/common
          python -m pip install -r backend/services/risk/api/requirements.txt
          python -m pip install -r backend/services/risk/metrics/requirements.txt
          python -m pip install -r backend/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check backend/tests
      - name: Type check (mypy smoke scope)
        run: mypy backend/tests
      - name: Test (pytest)
        run: pytest -q

  backend-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: risk_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d risk_monitor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend/libs/common
          python -m pip install -r backend/services/risk/api/requirements.txt
          python -m pip install -r backend/requirements-dev.txt
      - name: Alembic upgrade head
        run: |
          cd backend
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/risk_monitor alembic -c alembic.ini upgrade head

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install deps
        run: npm install
      - name: Run tests
        run: npm test
      - name: Typecheck + build
        run: npm run build

  container-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - backend/services/risk/api/Dockerfile
          - backend/services/risk/worker/Dockerfile
          - backend/services/risk/ml/Dockerfile
          - backend/services/risk/notification/Dockerfile
          - backend/services/risk/connector/Dockerfile
          - backend/services/risk/metrics/Dockerfile
          - backend/services/risk/enrichment/Dockerfile
          - frontend/dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f ${{ matrix.dockerfile }} .

  infra-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate kustomize overlays
        run: |
          kubectl kustomize infra/eks/overlays/staging > /dev/null
          kubectl kustomize infra/eks/overlays/prod > /dev/null

name: CI

on:
  pull_request:
  push:
    branches: [main, work, "upgrade/**"]

jobs:
  risk_api_quality_gate:
    name: risk.api-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: risk_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d risk_monitor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: azure/setup-kubectl@v4

      - name: Security scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --no-git --redact --exit-code 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e backend/libs/common
          python -m pip install -r backend/services/api_gateway/requirements.txt
          python -m pip install -r backend/services/event_worker/requirements.txt
          python -m pip install -r backend/requirements-dev.txt

      - name: Backend quality checks
        run: |
          ruff check backend/tests
          mypy backend/tests
          pytest -q

      - name: Migration validation
        run: |
          cd backend
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/risk_monitor alembic -c alembic.ini upgrade head

      - name: Install frontend dependencies
        run: npm install --prefix frontend/dashboard

      - name: Frontend quality checks
        run: |
          npm test --prefix frontend/dashboard
          npm run build --prefix frontend/dashboard

      - name: Validate kustomize overlays
        run: |
          kubectl kustomize infra/eks/overlays/staging > /dev/null
          kubectl kustomize infra/eks/overlays/prod > /dev/null

  risk_api_build_gate:
    name: risk.api-build-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [risk_api_quality_gate]
    steps:
      - uses: actions/checkout@v4

      - name: Build service images
        run: |
          set -euo pipefail
          dockerfiles=(
            backend/services/api_gateway/Dockerfile
            backend/services/event_worker/Dockerfile
            backend/services/ml_inference/Dockerfile
            backend/services/notification_service/Dockerfile
            backend/services/data_connector/Dockerfile
            backend/services/metrics_aggregator/Dockerfile
            backend/services/feature_enrichment/Dockerfile
            frontend/dashboard/Dockerfile
          )
          for dockerfile in "${dockerfiles[@]}"; do
            echo "Building image from ${dockerfile}"
            docker build -f "${dockerfile}" .
          done

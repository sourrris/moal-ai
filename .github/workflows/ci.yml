name: CI

on:
  pull_request:
  push:
    branches: [main, work, "upgrade/**"]

jobs:
  risk_api_quality_gate:
    name: risk.api-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: risk_monitor
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d risk_monitor"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: azure/setup-kubectl@v4

      - name: Security scan
        run: |
          set -euo pipefail
          gitleaks_version="8.24.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${gitleaks_version}/gitleaks_${gitleaks_version}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          /tmp/gitleaks detect --source . --no-git --redact --exit-code 1

      - name: Install backend dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e backend/libs/common
          requirement_files="$(find backend/services -type f -name requirements.txt | sort)"
          if [ -z "${requirement_files}" ]; then
            echo "No backend service requirements files found under backend/services"
            exit 1
          fi
          while IFS= read -r requirement_file; do
            echo "Installing ${requirement_file}"
            python -m pip install -r "${requirement_file}"
          done <<< "${requirement_files}"
          python -m pip install -r backend/requirements-dev.txt

      - name: Backend quality checks
        run: |
          ruff check backend/tests
          mypy backend/tests
          bandit -r backend/services backend/libs -q --severity-level medium --skip B608
          pytest -q

      - name: Migration validation
        run: |
          cd backend
          DATABASE_URL=postgresql+asyncpg://postgres:postgres@localhost:5432/risk_monitor alembic -c alembic.ini upgrade head

      - name: Install frontend dependencies
        run: |
          npm install --prefix frontend/dashboard
          npm install --prefix frontend/control-tenant
          npm install --prefix frontend/control-ops

      - name: Install Playwright browser
        run: |
          cd frontend/control-ops
          npx playwright install --with-deps chromium

      - name: Frontend quality checks
        run: |
          npm test --prefix frontend/dashboard
          npm run build --prefix frontend/dashboard
          npm test --prefix frontend/control-tenant
          npm run lint --prefix frontend/control-tenant
          npm run build --prefix frontend/control-tenant
          npm run lint --prefix frontend/control-ops
          npm run build --prefix frontend/control-ops

      - name: Ops control browser smoke
        run: |
          set -euo pipefail
          cd frontend/control-ops
          npm run dev -- --host 127.0.0.1 --port 4175 >/tmp/control-ops.log 2>&1 &
          server_pid=$!
          trap 'kill "${server_pid}" >/dev/null 2>&1 || true' EXIT
          timeout 60 bash -c 'until curl -fsS http://127.0.0.1:4175 >/dev/null; do sleep 1; done'
          PLAYWRIGHT_BASE_URL=http://127.0.0.1:4175 npm run test:e2e

      - name: Validate kustomize overlays
        run: |
          kubectl kustomize infra/eks/overlays/staging > /dev/null
          kubectl kustomize infra/eks/overlays/prod > /dev/null

  risk_api_build_gate:
    name: risk.api-build-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [risk_api_quality_gate]
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service images
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          PUSH: ${{ github.ref == 'refs/heads/main' && 'true' || 'false' }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::8}"
          build_and_push() {
            local tag="$1"
            local dockerfile="$2"
            docker build -t "ghcr.io/${GITHUB_REPOSITORY,,}/${tag}:${SHORT_SHA}" -f "${dockerfile}" .
            if [ "${PUSH}" = "true" ]; then
              docker push "ghcr.io/${GITHUB_REPOSITORY,,}/${tag}:${SHORT_SHA}"
              docker tag "ghcr.io/${GITHUB_REPOSITORY,,}/${tag}:${SHORT_SHA}" "ghcr.io/${GITHUB_REPOSITORY,,}/${tag}:latest"
              docker push "ghcr.io/${GITHUB_REPOSITORY,,}/${tag}:latest"
            fi
          }
          dockerfiles="$(find backend/services -type f -name Dockerfile | sort)"
          while IFS= read -r dockerfile; do
            svc="$(basename "$(dirname "${dockerfile}")")"
            build_and_push "${svc}" "${dockerfile}"
          done <<< "${dockerfiles}"
          build_and_push "migrations" "backend/Dockerfile.migrations"
          build_and_push "dashboard" "frontend/dashboard/Dockerfile"
          build_and_push "control-tenant" "frontend/control-tenant/Dockerfile"
          build_and_push "control-ops" "frontend/control-ops/Dockerfile"

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true

services:
  postgres:
    image: postgres:16-alpine
    container_name: moal-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-risk_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-risk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-risk}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-risk} -d ${POSTGRES_DB:-risk_monitor}']
      interval: 10s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile.migrations
    container_name: moal-db-migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  api:
    build:
      context: .
      dockerfile: backend/services/risk/api/Dockerfile
    container_name: moal-api
    environment:
      SERVICE_NAME: moal-api
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      ML_INFERENCE_URL: http://ml:8000
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      ml:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  ml:
    build:
      context: .
      dockerfile: backend/services/risk/ml/Dockerfile
    container_name: moal-ml
    environment:
      SERVICE_NAME: moal-ml
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_DIR: /models
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
    volumes:
      - model_data:/models
    ports:
      - '8001:8000'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  dashboard:
    build:
      context: .
      dockerfile: frontend/dashboard/Dockerfile
    container_name: moal-dashboard
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - '5173:5173'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  model_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: risk-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-risk_monitor}
      POSTGRES_USER: ${POSTGRES_USER:-risk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-risk}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-risk} -d ${POSTGRES_DB:-risk_monitor}']
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: risk-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: risk-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrations
    container_name: risk-db-migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  ml-inference:
    build:
      context: ./backend
      dockerfile: services/risk/ml/Dockerfile
    container_name: risk-ml-inference
    environment:
      SERVICE_NAME: ml-inference
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      MODEL_DIR: /models
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      ML_INFERENCE_URL: http://ml-inference:8000
    volumes:
      - model_data:/models
    ports:
      - '8001:8000'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  feature-enrichment:
    build:
      context: ./backend
      dockerfile: services/risk/enrichment/Dockerfile
    container_name: risk-feature-enrichment
    environment:
      SERVICE_NAME: feature-enrichment
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8040
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      DATA_CONNECTOR_URL: http://data-connector:8030
    ports:
      - '8040:8040'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8040/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  data-connector:
    build:
      context: .
      dockerfile: backend/services/risk/connector/Dockerfile
    container_name: risk-data-connector
    environment:
      SERVICE_NAME: data-connector
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8030
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      OFAC_SLS_URL: ${OFAC_SLS_URL:-https://sanctionslistservice.ofac.treas.gov/api/PublicationPreview/exports/SDN.CSV}
      FATF_SOURCE_URL: ${FATF_SOURCE_URL:-https://www.fatf-gafi.org/en/topics/high-risk-and-other-monitored-jurisdictions.html}
      ECB_FX_URL: ${ECB_FX_URL:-https://data-api.ecb.europa.eu/service/data}
      CONNECTORS_V2_ENABLED: ${CONNECTORS_V2_ENABLED:-true}
      RABBITMQ_QUEUE_TYPE: ${RABBITMQ_QUEUE_TYPE:-classic}
    ports:
      - '8030:8030'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8030/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  metrics-aggregator:
    build:
      context: ./backend
      dockerfile: services/risk/metrics/Dockerfile
    container_name: risk-metrics-aggregator
    environment:
      SERVICE_NAME: metrics-aggregator
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8050
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
    ports:
      - '8050:8050'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8050/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  control-api:
    build:
      context: ./backend
      dockerfile: services/risk/control_plane/Dockerfile
    container_name: risk-control-api
    environment:
      SERVICE_NAME: control-api
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8060
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      API_GATEWAY_URL: http://api-gateway:8000
      DATA_CONNECTOR_URL: http://data-connector:8030
      ML_INFERENCE_URL: http://ml-inference:8000
      CORS_ALLOW_ORIGINS: http://${LOCAL_CONTROL_DOMAIN:-control.localhost},http://${LOCAL_OPS_CONTROL_DOMAIN:-ops-control.localhost},http://localhost:5174,http://localhost:5175
    ports:
      - '8060:8060'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      data-connector:
        condition: service_healthy
      ml-inference:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8060/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  alert-router:
    build:
      context: ./backend
      dockerfile: services/risk/alert_router/Dockerfile
    container_name: risk-alert-router
    environment:
      SERVICE_NAME: alert-router
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8061
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      ALERT_ROUTER_MAX_ATTEMPTS: ${ALERT_ROUTER_MAX_ATTEMPTS:-3}
      ALERT_ROUTER_TIMEOUT_SECONDS: ${ALERT_ROUTER_TIMEOUT_SECONDS:-10}
      ALERT_ROUTER_EMAIL_SMTP_HOST: ${ALERT_ROUTER_EMAIL_SMTP_HOST:-localhost}
      ALERT_ROUTER_EMAIL_SMTP_PORT: ${ALERT_ROUTER_EMAIL_SMTP_PORT:-25}
      ALERT_ROUTER_EMAIL_FROM: ${ALERT_ROUTER_EMAIL_FROM:-no-reply@aegis.local}
    ports:
      - '8061:8061'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      control-api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8061/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  api-gateway:
    build:
      context: .
      dockerfile: backend/services/risk/api/Dockerfile
    container_name: risk-api-gateway
    environment:
      SERVICE_NAME: api-gateway
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ALLOW_ORIGINS: http://${LOCAL_APP_DOMAIN:-app.localhost},http://localhost:5173,http://127.0.0.1:5173
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      ML_INFERENCE_URL: http://ml-inference:8000
      FEATURE_ENRICHMENT_URL: http://feature-enrichment:8040
    ports:
      - '8000:8000'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-inference:
        condition: service_healthy
      feature-enrichment:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  event-worker:
    build:
      context: ./backend
      dockerfile: services/risk/worker/Dockerfile
    container_name: risk-event-worker
    environment:
      SERVICE_NAME: event-worker
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8010
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
      ML_INFERENCE_URL: http://ml-inference:8000
      FEATURE_ENRICHMENT_URL: http://feature-enrichment:8040
      MAX_EVENT_RETRIES: 3
    ports:
      - '8010:8010'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-inference:
        condition: service_healthy
      feature-enrichment:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8010/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  notification-service:
    build:
      context: ./backend
      dockerfile: services/risk/notification/Dockerfile
    container_name: risk-notification-service
    environment:
      SERVICE_NAME: notification-service
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_PORT: 8020
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER:-risk}:${POSTGRES_PASSWORD:-risk}@postgres:5432/${POSTGRES_DB:-risk_monitor}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-prod}
    ports:
      - '8020:8020'
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8020/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 8

  dashboard:
    build:
      context: .
      dockerfile: frontend/dashboard/Dockerfile
    container_name: risk-dashboard
    environment:
      VITE_API_BASE_URL: http://${LOCAL_API_DOMAIN:-api.localhost}
      VITE_WS_BASE_URL: http://${LOCAL_WS_DOMAIN:-ws.localhost}
      VITE_CONTROL_TENANT_URL: http://${LOCAL_CONTROL_DOMAIN:-control.localhost}
      VITE_CONTROL_OPS_URL: http://${LOCAL_OPS_CONTROL_DOMAIN:-ops-control.localhost}
    ports:
      - '5173:5173'
    depends_on:
      api-gateway:
        condition: service_healthy
      notification-service:
        condition: service_healthy

  control-tenant:
    build:
      context: .
      dockerfile: frontend/control-tenant/Dockerfile
    container_name: risk-control-tenant
    environment:
      VITE_CONTROL_API_BASE_URL: http://${LOCAL_CONTROL_API_DOMAIN:-control-api.localhost}
      VITE_MONITORING_APP_URL: http://${LOCAL_APP_DOMAIN:-app.localhost}
    ports:
      - '5174:5174'
    depends_on:
      control-api:
        condition: service_healthy

  control-ops:
    build:
      context: .
      dockerfile: frontend/control-ops/Dockerfile
    container_name: risk-control-ops
    environment:
      VITE_CONTROL_API_BASE_URL: http://${LOCAL_CONTROL_API_DOMAIN:-control-api.localhost}
      VITE_MONITORING_APP_URL: http://${LOCAL_APP_DOMAIN:-app.localhost}
      VITE_TENANT_CONSOLE_URL: http://${LOCAL_CONTROL_DOMAIN:-control.localhost}
    ports:
      - '5175:5175'
    depends_on:
      control-api:
        condition: service_healthy

  local-gateway:
    image: caddy:2-alpine
    container_name: risk-local-gateway
    environment:
      LOCAL_APP_DOMAIN: ${LOCAL_APP_DOMAIN:-app.localhost}
      LOCAL_API_DOMAIN: ${LOCAL_API_DOMAIN:-api.localhost}
      LOCAL_WS_DOMAIN: ${LOCAL_WS_DOMAIN:-ws.localhost}
      LOCAL_CONTROL_DOMAIN: ${LOCAL_CONTROL_DOMAIN:-control.localhost}
      LOCAL_OPS_CONTROL_DOMAIN: ${LOCAL_OPS_CONTROL_DOMAIN:-ops-control.localhost}
      LOCAL_CONTROL_API_DOMAIN: ${LOCAL_CONTROL_API_DOMAIN:-control-api.localhost}
    ports:
      - '80:80'
    volumes:
      - ./infra/reverse-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      dashboard:
        condition: service_started
      control-tenant:
        condition: service_started
      control-ops:
        condition: service_started
      api-gateway:
        condition: service_healthy
      control-api:
        condition: service_healthy
      notification-service:
        condition: service_healthy

volumes:
  postgres_data:
  model_data:

# Nginx reverse-proxy for local (non-Docker) development.
# Started/stopped automatically by scripts/local/start.sh and stop.sh.

worker_processes 1;
error_log /tmp/aegis-nginx-error.log warn;
pid       /tmp/aegis-nginx.pid;

events {
    worker_connections 128;
}

http {
    access_log off;

    # ── Dashboard (Vite dev server) ─────────────────────────────────
    server {
        listen       80;
        server_name  app.localhost;

        location / {
            proxy_pass         http://127.0.0.1:5173;
            proxy_http_version 1.1;

            # Vite HMR uses WebSockets
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }

    # ── API Gateway ─────────────────────────────────────────────────
    server {
        listen       80;
        server_name  api.localhost;

        location / {
            proxy_pass         http://127.0.0.1:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }

    # ── Notification / WebSocket service ────────────────────────────
    server {
        listen       80;
        server_name  ws.localhost;

        location / {
            proxy_pass         http://127.0.0.1:8020;
            proxy_http_version 1.1;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
        }
    }
}
